<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->

    <header>
        <nav class="navbar">

            <h2 class="logo">ExpenseTracker</h2>

            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="add-expense.html">Add Expense</a></li>
                <li><a href="expenses.html">Expenses</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>

        </nav>
    </header>


    <!-- Page Heading -->

    <section class="form-header">

        <h1>Add New Expense</h1>

        <p>Record your spending details here.</p>

    </section>


    <!-- Expense Form -->

    <section class="expense-form-section">

        <form id="expenseForm">

            <div class="form-group">

                <label>Expense Name</label>

                <input type="text" id="expenseName" placeholder="Enter expense name">

            </div>


            <div class="form-group">

                <label>Amount</label>

                <input type="number" id="amount" placeholder="Enter amount">

            </div>


            <div class="form-group">

                <label>Category</label>

                <select id="category">

                    <option value="">Choose Category</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                    <option>Education</option>

                </select>

            </div>


            <div class="form-group">

                <label>Date</label>

                <input type="date" id="date">

            </div>


            <div class="form-group">

                <label>Notes</label>

                <textarea id="notes" rows="5" placeholder="Additional notes..."></textarea>

            </div>


            <div class="form-buttons">

                <button type="button" onclick="saveExpense()">
                    Save Expense
                </button>

                <button type="reset">
                    Cancel
                </button>

            </div>

        </form>

    </section>


    <footer>

        <p>© 2026 Expense Tracker</p>

    </footer>


    <script src="main.js"></script>

</body>

</html>
