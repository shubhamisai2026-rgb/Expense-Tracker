<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>

<link rel="stylesheet" href="../static/style.css">

<body>
    <!-- Navbar -->
     
    <header>
        <nav class="navbar">

            <h2 class="logo">ExpenseTracker</h2>

            <ul class="nav-links">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/add-expense">Add Expense</a></li>
                <li><a href="/expenses">Expenses</a></li>
                <li><a href="/categories">Categories</a></li>
                <li><a href="/reports">Reports</a></li>
            </ul>

        </nav>
    </header>


    <!-- Page Heading -->

    <section class="form-header">

        <h1>Add New Expense</h1>

        <p>Record your spending details here.</p>

    </section>


    <!-- Expense Form -->

    <section class="expense-form-section">

        <form id="expenseForm">

            <div class="form-group">

                <label>Expense Name</label>

                <input type="text" id="expenseName" placeholder="Enter expense name">

            </div>


            <div class="form-group">

                <label>Amount</label>

                <input type="number" id="amount" placeholder="Enter amount">

            </div>


            <div class="form-group">

                <label>Category</label>

                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="category" style="flex: 1;">
                        <option value="">Choose Category</option>
                    </select>
                    <button type="button" onclick="showAddCategoryModal()" style="padding: 8px 15px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        + Add
                    </button>
                </div>

            </div>


            <div class="form-group">

                <label>Date</label>

                <input type="date" id="date">

            </div>


            <div class="form-group">

                <label>Notes</label>

                <textarea id="notes" rows="5" placeholder="Additional notes..."></textarea>

            </div>


            <div class="form-buttons">

                <button type="button" onclick="saveExpense()">
                    Save Expense
                </button>

                <button type="reset">
                    Cancel
                </button>

            </div>

        </form>

    </section>


    <!-- Add Category Modal -->

    <div id="categoryModal" style="display:none; position:fixed; z-index:1; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.4);">
        <div style="background-color:#fefefe; margin:15% auto; padding:20px; border:1px solid #888; width:300px; border-radius:8px;">
            <span onclick="closeAddCategoryModal()" style="color:#aaa; float:right; font-size:28px; font-weight:bold; cursor:pointer;">&times;</span>
            <h2>Add New Category</h2>
            <input type="text" id="newCategoryName" placeholder="Enter category name" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
            <button onclick="addCategoryFromModal()" style="width:100%; padding:10px; background-color:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; margin-top:10px;">
                Add Category
            </button>
        </div>
    </div>


    <footer>

        <p>© 2026 Expense Tracker</p>

    </footer>


<script src="../static/main.js"></script>
<script>
    // Load categories when the page loads
    document.addEventListener("DOMContentLoaded", function() {
        loadCategories();
    });
</script>
</body>

</html>
